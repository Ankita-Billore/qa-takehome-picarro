name: QA Automation Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run API tests
      run: |
        mkdir -p reports/allure-results
        pytest tests/api/ -v --junit-xml=reports/api-results.xml --html=reports/api-report.html --self-contained-html --alluredir=reports/allure-results
    
    - name: Install Allure CLI (System Tool)
      if: always()
      run: |
        sudo apt-get update
        sudo apt-get install -y default-jre
        wget https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.42.0/allure-commandline-2.42.0.zip
        unzip allure-commandline-2.42.0.zip -d /opt/
        sudo ln -s /opt/allure-2.42.0/bin/allure /usr/bin/allure
    
    - name: Generate Allure Report
      if: always()
      run: |
        allure generate reports/allure-results -o reports/allure-report --clean
    
    - name: Upload API test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: api-test-reports
        path: reports/

  ui-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install
    
    - name: Run UI tests
      run: |
        mkdir -p reports/allure-results
        pytest tests/ui/ -v --junit-xml=reports/ui-results.xml --html=reports/ui-report.html --self-contained-html --alluredir=reports/allure-results
    
    - name: Install Allure CLI (System Tool)
      if: always()
      run: |
        sudo apt-get update
        sudo apt-get install -y default-jre
        wget https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.42.0/allure-commandline-2.42.0.zip
        unzip allure-commandline-2.42.0.zip -d /opt/
        sudo ln -s /opt/allure-2.42.0/bin/allure /usr/bin/allure
    
    - name: Generate Allure Report
      if: always()
      run: |
        allure generate reports/allure-results -o reports/allure-report --clean
    
    - name: Upload UI test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ui-test-reports
        path: reports/

  smoke-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install
    
    - name: Run smoke tests
      run: |
        mkdir -p reports/allure-results
        pytest -m smoke -v --junit-xml=reports/smoke-results.xml --html=reports/smoke-report.html --self-contained-html --alluredir=reports/allure-results
    
    - name: Install Allure CLI (System Tool)
      if: always()
      run: |
        sudo apt-get update
        sudo apt-get install -y default-jre
        wget https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.42.0/allure-commandline-2.42.0.zip
        unzip allure-commandline-2.42.0.zip -d /opt/
        sudo ln -s /opt/allure-2.42.0/bin/allure /usr/bin/allure
    
    - name: Generate Allure Report
      if: always()
      run: |
        allure generate reports/allure-results -o reports/allure-report --clean
    
    - name: Upload smoke test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: smoke-test-reports
        path: reports/
