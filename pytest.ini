[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --html=reports/report.html
    --self-contained-html
    --tb=short
markers =
    api: API tests
    ui: UI tests
    smoke: Smoke tests
    regression: Regression tests
    negative: Negative test cases
    loadtest: Load and performance tests
    critical: Critical/blocking tests
